<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rực Rỡ Tuổi 18 - Chúc Mừng Sinh Nhật</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { line-height: 1.5; -webkit-text-size-adjust: 100%; }
        body { 
            font-family: Montserrat, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;
            background: linear-gradient(135deg, #fff8f5 0%, #ffe4f0 50%, #fff0f7 100%);
            min-height: 100vh;
        }
        img, svg { display: block; max-width: 100%; }
        button, input { font-family: inherit; font-size: 100%; }
        button { cursor: pointer; border: none; background: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    
    <!-- Header -->
    <header style="text-align: center; padding-top: 1.5rem; padding-bottom: 1rem;">
        <div style="display: inline-block;">
            <svg style="width: 4rem; height: 4rem; margin: 0 auto;" viewBox="0 0 100 100" fill="none">
                <circle cx="50" cy="50" r="45" stroke="#c71585" stroke-width="2"/>
                <text x="50" y="45" text-anchor="middle" fill="#c71585" font-family="Montserrat" font-weight="700" font-size="11">CELEBRATE</text>
                <text x="50" y="60" text-anchor="middle" fill="#c71585" font-family="Montserrat" font-weight="800" font-size="14">18 YEARS</text>
            </svg>
        </div>
    </header>

    <!-- Main Content -->
    <main style="padding-bottom: 3rem;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 1rem;">
            
            <!-- Title -->
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h1 style="font-size: 2.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: -0.025em; margin-bottom: 0.5rem; background: linear-gradient(135deg, #c71585 0%, #ff69b4 50%, #e91e63 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    RỰC RỠ TUỔI <span style="color: #c71585;">18</span>,
                </h1>
                <h2 style="font-size: 1.5rem; font-weight: 700; color: #c71585; text-transform: uppercase;">
                    Còn bạn?
                </h2>
            </div>

            <!-- Two Column Layout: Preview LEFT, Form RIGHT -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; align-items: start;">
                
                <!-- LEFT: Preview Image Box -->
                <div>
                    <div style="position: relative; max-width: 400px; margin: 0 auto;">
                        <div style="position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 12px; box-shadow: 0 8px 24px rgba(199, 21, 133, 0.15);">
                            <!-- User Image Layer -->
                            <div id="imgAvatar" style="position: absolute; inset: 0; background: #fff1ea; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                                <div id="placeholderText" style="text-align: center; padding: 2rem;">
                                    <svg style="width: 80px; height: 80px; margin: 0 auto 1rem; color: #d1d5db;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                    <p style="color: #9ca3af; font-size: 0.9rem;">Ảnh của bạn sẽ hiển thị ở đây</p>
                                </div>
                                <img src="" id="userImage" class="hidden" style="width: 100%; height: 100%; object-fit: cover;" alt="User photo">
                            </div>
                            
                            <!-- SVG Overlay Frame Layer -->
                            <div style="position: absolute; inset: 0; pointer-events: none; z-index: 10;">
                                <svg viewBox="0 0 400 400" style="width: 100%; height: 100%;">
                                    <defs>
                                        <pattern id="bgPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                                            <rect width="40" height="40" fill="#c71585" opacity="0.05"/>
                                            <circle cx="10" cy="10" r="2" fill="#c71585" opacity="0.15"/>
                                            <circle cx="30" cy="30" r="2" fill="#c71585" opacity="0.15"/>
                                        </pattern>
                                    </defs>
                                    <rect width="100%" height="100%" fill="url(#bgPattern)"/>
                                    <g id="corners">
                                        <path d="M0 0 L60 0 Q40 40 0 60 Z" fill="#c71585" opacity="0.9"/>
                                        <path d="M0 0 L45 0 Q30 30 0 45 Z" fill="#ff69b4"/>
                                        <path d="M400 0 L340 0 Q360 40 400 60 Z" fill="#c71585" opacity="0.9"/>
                                        <path d="M400 0 L355 0 Q370 30 400 45 Z" fill="#ff69b4"/>
                                        <path d="M0 400 L60 400 Q40 360 0 340 Z" fill="#c71585" opacity="0.9"/>
                                        <path d="M0 400 L45 400 Q30 370 0 355 Z" fill="#ff69b4"/>
                                        <path d="M400 400 L340 400 Q360 360 400 340 Z" fill="#c71585" opacity="0.9"/>
                                        <path d="M400 400 L355 400 Q370 370 400 355 Z" fill="#ff69b4"/>
                                    </g>
                                    <g fill="#FFD700">
                                        <path d="M30 80 L32 85 L37 85 L33 88 L35 93 L30 90 L25 93 L27 88 L23 85 L28 85 Z"/>
                                        <path d="M370 120 L371 123 L374 123 L372 125 L373 128 L370 126 L367 128 L368 125 L366 123 L369 123 Z"/>
                                        <path d="M50 350 L51 352 L54 352 L52 354 L53 356 L50 355 L47 356 L48 354 L46 352 L49 352 Z"/>
                                        <path d="M350 370 L352 373 L357 373 L354 375 L355 378 L352 376 L349 378 L350 375 L348 373 L351 373 Z"/>
                                    </g>
                                    <g>
                                        <polygon points="20,50 22,55 27,55 23,58 25,63 20,60 15,63 17,58 13,55 18,55" fill="#FFD700" opacity="0.8"/>
                                        <polygon points="380,70 381,73 384,73 382,74 383,77 381,75 379,77 380,74 378,73 381,73" fill="#FFD700" opacity="0.8"/>
                                        <polygon points="40,360 41,363 44,363 42,364 43,367 40,365 37,367 38,364 36,363 39,363" fill="#FFD700" opacity="0.8"/>
                                        <polygon points="360,340 362,344 367,344 364,346 365,349 362,347 359,349 360,346 358,344 361,344" fill="#FFD700" opacity="0.8"/>
                                    </g>
                                    <text x="200" y="50" text-anchor="middle" fill="#c71585" font-family="Playfair Display" font-weight="700" font-size="32">18</text>
                                    <text x="206" y="65" text-anchor="middle" font-family="Montserrat" font-weight="800" font-size="14" fill="#c71585">TUỔI</text>
                                    <text x="200" y="380" text-anchor="middle" fill="#c71585" font-family="Montserrat" font-weight="700" font-size="16">HAPPY 18TH BIRTHDAY</text>
                                </svg>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Zoom Controls -->
                    <div id="zoomControls" class="hidden" style="margin-top: 1rem; display: flex; align-items: center; gap: 0.75rem; max-width: 300px; margin-left: auto; margin-right: auto;">
                        <button type="button" id="zoomOut" style="width: 40px; height: 40px; border-radius: 50%; background: white; border: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                            <svg style="width: 16px; height: 16px; color: #4b5563;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/></svg>
                        </button>
                        <input type="range" id="zoomSlider" min="50" max="200" value="100" step="1" style="flex: 1; accent-color: #c71585;">
                        <button type="button" id="zoomIn" style="width: 40px; height: 40px; border-radius: 50%; background: white; border: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                            <svg style="width: 16px; height: 16px; color: #4b5563;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        </button>
                    </div>
                </div>
                
                <!-- RIGHT: Upload Form -->
                <div>
                    <div style="background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                        <form id="uploadForm" style="display: flex; flex-direction: column; gap: 1.5rem;">
                            
                            <!-- Upload Zone -->
                            <div>
                                <label style="display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem;">Ảnh của bạn</label>
                                <div style="position: relative;">
                                    <label for="inputImage" id="dropZone" style="display: block; width: 100%; height: 180px; border-radius: 12px; border: 2px dashed #d1d5db; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; background: #fafafa;">
                                        <div style="width: 64px; height: 64px; border-radius: 50%; background: #fce7f3; display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem;">
                                            <svg style="width: 32px; height: 32px; color: #c71585;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                                            </svg>
                                        </div>
                                        <p style="color: #6b7280; font-weight: 500; font-size: 0.9rem;" id="uploadText">Kéo và thả hoặc tải lên hình ảnh</p>
                                        <p style="color: #9ca3af; font-size: 0.75rem; margin-top: 0.25rem;">PNG, JPG, GIF (tối đa 10MB)</p>
                                    </label>
                                    <input type="file" id="inputImage" accept="image/*" class="hidden">
                                    
                                    <!-- File preview -->
                                    <div id="filePreview" class="hidden" style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; background: #fdf2f8; border-radius: 8px;">
                                        <svg style="width: 20px; height: 20px; color: #c71585;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                        <span id="fileName" style="font-size: 0.875rem; color: #374151; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">filename.jpg</span>
                                        <button type="button" id="removeFile" style="width: 24px; height: 24px; border-radius: 50%; border: none; background: none; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                                            <svg style="width: 16px; height: 16px; color: #6b7280;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Age Input -->
                            <div>
                                <label for="inputAge" style="display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem;">Tuổi rực rỡ</label>
                                <input type="text" id="inputAge" placeholder="Nhập tuổi của bạn" style="width: 100%; padding: 0.75rem 1rem; border: 1px solid #e5e7eb; border-radius: 8px; outline: none; font-size: 1rem;">
                            </div>
                            
                            <!-- Buttons -->
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <button type="button" id="btnPreview" disabled style="padding: 0.875rem; background: #c71585; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: not-allowed; opacity: 0.5; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.9rem;" onmouseover="if(!this.disabled){this.style.background='#a0126a';}" onmouseout="if(!this.disabled){this.style.background='#c71585';}">
                                    <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                    Xem Review
                                </button>
                                <button type="button" id="btnDownload" disabled style="padding: 0.875rem; background: #c71585; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: not-allowed; opacity: 0.5; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.9rem;" onmouseover="if(!this.disabled){this.style.background='#a0126a';}" onmouseout="if(!this.disabled){this.style.background='#c71585';}">
                                    <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                    Tải xuống
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Preview Modal -->
    <div id="previewModal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 50; display: none; align-items: center; justify-content: center; padding: 1rem;">
        <div style="background: white; border-radius: 16px; padding: 1.5rem; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                <h3 style="font-size: 1.25rem; font-weight: 700; color: #1f2937;">Ảnh Review</h3>
                <button type="button" id="closeModal" style="width: 32px; height: 32px; border-radius: 50%; border: none; background: none; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                    <svg style="width: 20px; height: 20px; color: #6b7280;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div style="position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 8px; background: #fff1ea;">
                <canvas id="modalCanvas" style="width: 100%; height: 100%; object-fit: contain;"></canvas>
            </div>
            <div style="margin-top: 1rem; display: flex; align-items: center; gap: 0.75rem;">
                <button type="button" id="modalZoomOut" style="width: 36px; height: 36px; border-radius: 50%; background: #f3f4f6; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                    <svg style="width: 16px; height: 16px; color: #4b5563;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/></svg>
                </button>
                <input type="range" id="modalZoomSlider" min="50" max="200" value="100" step="1" style="flex: 1; accent-color: #c71585;">
                <button type="button" id="modalZoomIn" style="width: 36px; height: 36px; border-radius: 50%; background: #f3f4f6; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                    <svg style="width: 16px; height: 16px; color: #4b5563;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>
            </div>
            <button type="button" id="modalDownload" style="margin-top: 1rem; width: 100%; padding: 0.75rem; background: #c71585; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 1rem;">
                <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                Tải ảnh xuống
            </button>
        </div>
    </div>

    <!-- Hidden Canvas for Image Processing -->
    <canvas id="processCanvas" style="display: none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
