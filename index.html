<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rực Rỡ Tuổi 18 - Chúc Mừng Sinh Nhật</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex flex-col">
    
    <!-- Header -->
    <header class="pt-6 pb-4">
        <div class="container mx-auto px-4 text-center">
            <div class="inline-block mb-4">
                <svg class="w-16 h-16 mx-auto" viewBox="0 0 100 100" fill="none">
                    <circle cx="50" cy="50" r="45" stroke="#c71585" stroke-width="2"/>
                    <text x="50" y="45" text-anchor="middle" fill="#c71585" font-family="Montserrat" font-weight="700" font-size="11">CELEBRATE</text>
                    <text x="50" y="60" text-anchor="middle" fill="#c71585" font-family="Montserrat" font-weight="800" font-size="14">18 YEARS</text>
                </svg>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center py-8">
        <div class="container mx-auto px-4 max-w-6xl">
            
            <!-- Title -->
            <div class="text-center mb-8">
                <h1 class="title-gradient font-extrabold text-4xl md:text-6xl uppercase tracking-tight mb-2">
                    RỰC RỠ TUỔI <span class="text-[#c71585]">18</span>,
                </h1>
                <h2 class="text-xl md:text-3xl font-bold text-[#c71585] uppercase tracking-wide">
                    Còn bạn?
                </h2>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                
                <!-- Preview Image Box -->
                <div class="order-2 lg:order-1">
                    <div class="box-frame relative mx-auto" id="boxFrame">
                        <div class="frame-container relative w-full aspect-square overflow-hidden rounded-lg">
                            <!-- User Image -->
                            <div class="img-avatar absolute inset-0 bg-[#fff1ea] flex items-center justify-center overflow-hidden" id="imgAvatar">
                                <div id="placeholderText" class="text-center p-4">
                                    <svg class="w-16 h-16 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                    <p class="text-gray-400 text-sm">Ảnh của bạn sẽ hiển thị ở đây</p>
                                </div>
                                <img src="" id="userImage" class="hidden w-full h-full object-cover" alt="User photo">
                            </div>
                            
                            <!-- SVG Overlay Frame -->
                            <div class="frame-overlay absolute inset-0 pointer-events-none z-10">
                                <svg viewBox="0 0 400 400" class="w-full h-full" id="svgFrame">
                                    <defs>
                                        <pattern id="bgPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                                            <rect width="40" height="40" fill="#c71585" opacity="0.05"/>
                                            <circle cx="10" cy="10" r="2" fill="#c71585" opacity="0.15"/>
                                            <circle cx="30" cy="30" r="2" fill="#c71585" opacity="0.15"/>
                                        </pattern>
                                    </defs>
                                    
                                    <!-- Inner background -->
                                    <rect width="100%" height="100%" fill="url(#bgPattern)"/>
                                    
                                    <!-- Corner decorations -->
                                    <g id="corners">
                                        <!-- Top Left -->
                                        <path d="M0 0 L60 0 Q40 40 0 60 Z" fill="#c71585" opacity="0.9"/>
                                        <path d="M0 0 L45 0 Q30 30 0 45 Z" fill="#ff69b4"/>
                                        <!-- Top Right -->
                                        <path d="M400 0 L340 0 Q360 40 400 60 Z" fill="#c71585" opacity="0.9"/>
                                        <path d="M400 0 L355 0 Q370 30 400 45 Z" fill="#ff69b4"/>
                                        <!-- Bottom Left -->
                                        <path d="M0 400 L60 400 Q40 360 0 340 Z" fill="#c71585" opacity="0.9"/>
                                        <path d="M0 400 L45 400 Q30 370 0 355 Z" fill="#ff69b4"/>
                                        <!-- Bottom Right -->
                                        <path d="M400 400 L340 400 Q360 360 400 340 Z" fill="#c71585" opacity="0.9"/>
                                        <path d="M400 400 L355 400 Q370 370 400 355 Z" fill="#ff69b4"/>
                                    </g>
                                    
                                    <!-- Sparkles -->
                                    <g id="sparkles" fill="#FFD700">
                                        <path d="M30 80 L32 85 L37 85 L33 88 L35 93 L30 90 L25 93 L27 88 L23 85 L28 85 Z"/>
                                        <path d="M370 120 L371 123 L374 123 L372 125 L373 128 L370 126 L367 128 L368 125 L366 123 L369 123 Z"/>
                                        <path d="M50 350 L51 352 L54 352 L52 354 L53 356 L50 355 L47 356 L48 354 L46 352 L49 352 Z"/>
                                        <path d="M350 370 L352 373 L357 373 L354 375 L355 378 L352 376 L349 378 L350 375 L348 373 L351 373 Z"/>
                                    </g>
                                    
                                    <!-- Stars -->
                                    <g id="stars">
                                        <polygon points="20,50 22,55 27,55 23,58 25,63 20,60 15,63 17,58 13,55 18,55" fill="#FFD700" opacity="0.8"/>
                                        <polygon points="380,70 381,73 384,73 382,74 383,77 381,75 379,77 380,74 378,73 381,73" fill="#FFD700" opacity="0.8"/>
                                        <polygon points="40,360 41,363 44,363 42,364 43,367 40,365 37,367 38,364 36,363 39,363" fill="#FFD700" opacity="0.8"/>
                                        <polygon points="360,340 362,344 367,344 364,346 365,349 362,347 359,349 360,346 358,344 361,344" fill="#FFD700" opacity="0.8"/>
                                    </g>
                                    
                                    <!-- Heart decorations -->
                                    <g id="hearts" fill="#ff69b4">
                                        <path d="M25,25 C25,20 20,15 15,15 C10,15 5,20 5,25 C5,30 15,38 15,38 C15,38 25,30 25,25 Z" transform="scale(0.6) translate(15,15)"/>
                                        <path d="M380,25 C380,20 375,15 370,15 C365,15 360,20 360,25 C360,30 370,38 370,38 C370,38 380,30 380,25 Z" transform="scale(0.6) translate(380,15)"/>
                                        <path d="M25,380 C25,375 20,370 15,370 C10,370 5,375 5,380 C5,385 15,393 15,393 C15,393 25,385 25,380 Z" transform="scale(0.6) translate(15,365)"/>
                                        <path d="M380,380 C380,375 375,370 370,370 C365,370 360,375 360,380 C360,385 370,393 370,393 C370,393 380,385 380,380 Z" transform="scale(0.6) translate(380,365)"/>
                                    </g>
                                    
                                    <!-- Age Text -->
                                    <text x="200" y="50" text-anchor="middle" fill="#c71585" font-family="Playfair Display" font-weight="700" font-size="32" class="age-text">18</text>
                                    <text x="206" y="65" text-anchor="middle" font-family="Montserrat" font-weight="800" font-size="14" fill="#c71585" class="age-label">TUỔI</text>
                                    
                                    <!-- Bottom text - user age -->
                                    <text x="200" y="380" text-anchor="middle" fill="#c71585" font-family="Montserrat" font-weight="700" font-size="16" class="age-label">
                                        HAPPY 18TH BIRTHDAY
                                    </text>
                                    
                                    <!-- Ribbon decorations -->
                                    <path d="M0 180 Q50 160 80 180 T160 180 T240 180 T320 180 T400 170" stroke="#ff69b4" stroke-width="3" fill="none" opacity="0.5" stroke-dasharray="5,5"/>
                                    <path d="M0 220 Q60 200 100 220 T180 220 T260 220 T340 220 T400 210" stroke="#c71585" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="8,4"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Zoom Controls -->
                    <div id="zoomControls" class="mt-4 flex items-center gap-3 mx-auto max-w-xs hidden">
                        <button type="button" id="zoomOut" class="w-10 h-10 rounded-full bg-white shadow-md flex items-center justify-center hover:bg-gray-100 transition" aria-label="Zoom out">
                            <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                            </svg>
                        </button>
                        <input type="range" id="zoomSlider" min="10" max="300" value="100" step="1" class="flex-1 accent-[#c71585]">
                        <button type="button" id="zoomIn" class="w-10 h-10 rounded-full bg-white shadow-md flex items-center justify-center hover:bg-gray-100 transition" aria-label="Zoom in">
                            <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Upload Form -->
                <div class="order-1 lg:order-2">
                    <div class="bg-white rounded-2xl p-6 md:p-8 shadow-lg">
                        <form id="uploadForm" class="space-y-6">
                            <!-- Upload Zone -->
                            <div class="form-group">
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Ảnh của bạn</label>
                                <div class="relative">
                                    <label 
                                        for="inputImage" 
                                        id="dropZone"
                                        class="zone-input-image block w-full h-48 rounded-xl border-2 border-dashed border-gray-300 cursor-pointer hover:border-[#c71585] hover:bg-pink-50 transition-all duration-200 flex flex-col items-center justify-center"
                                    >
                                        <div class="w-16 h-16 rounded-full bg-pink-100 flex items-center justify-center mb-3 group-hover:bg-pink-200 transition" id="uploadIcon">
                                            <svg class="w-8 h-8 text-[#c71585]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                                            </svg>
                                        </div>
                                        <p class="text-gray-500 font-medium text-sm" id="uploadText">Kéo và thả hoặc tải lên hình ảnh</p>
                                        <p class="text-gray-400 text-xs mt-1">PNG, JPG, GIF (tối đa 10MB)</p>
                                    </label>
                                    <input type="file" id="inputImage" accept="image/*" class="hidden">
                                    
                                    <!-- File preview -->
                                    <div id="filePreview" class="hidden mt-2 flex items-center gap-2 p-2 bg-pink-50 rounded-lg">
                                        <svg class="w-5 h-5 text-[#c71585]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                        </svg>
                                        <span id="fileName" class="text-sm text-gray-700 flex-1 truncate">filename.jpg</span>
                                        <button type="button" id="removeFile" class="w-6 h-6 rounded-full hover:bg-pink-200 flex items-center justify-center transition">
                                            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Age Input -->
                            <div class="form-group">
                                <label for="inputAge" class="block text-sm font-semibold text-gray-700 mb-2">Tuổi rực rỡ</label>
                                <input 
                                    type="text" 
                                    id="inputAge" 
                                    placeholder="Nhập tuổi của bạn" 
                                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#c71585] focus:ring-2 focus:ring-pink-200 outline-none transition"
                                >
                            </div>
                            
                            <!-- Buttons -->
                            <div class="grid grid-cols-2 gap-4 pt-2">
                                <button 
                                    type="button" 
                                    id="btnPreview"
                                    class="btn-primary flex items-center justify-center gap-2 py-3 px-4 bg-[#c71585] text-white rounded-xl font-semibold hover:bg-[#a0126a] transition disabled:opacity-50 disabled:cursor-not-allowed"
                                    disabled
                                >
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                    <span>Xem Review</span>
                                </button>
                                <button 
                                    type="button" 
                                    id="btnDownload"
                                    class="btn-primary flex items-center justify-center gap-2 py-3 px-4 bg-[#c71585] text-white rounded-xl font-semibold hover:bg-[#a0126a] transition disabled:opacity-50 disabled:cursor-not-allowed"
                                    disabled
                                >
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11v8m-4-4l4 4m-4-4l4-4M7 4h10M4 7h16"/>
                                    </svg>
                                    <span>Tải xuống</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-black bg-opacity-75 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-4 md:p-6 max-w-lg w-full shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-gray-800">Ảnh Review</h3>
                <button type="button" id="closeModal" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center transition">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="relative w-full aspect-square overflow-hidden rounded-lg bg-[#fff1ea]">
                <div id="modalImageContainer" class="w-full h-full flex items-center justify-center">
                    <canvas id="modalCanvas" class="max-w-full max-h-full"></canvas>
                </div>
            </div>
            <div class="mt-4 flex items-center gap-3">
                <button type="button" id="modalZoomOut" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition">
                    <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                    </svg>
                </button>
                <input type="range" id="modalZoomSlider" min="10" max="300" value="100" step="1" class="flex-1 accent-[#c71585]">
                <button type="button" id="modalZoomIn" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition">
                    <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                </button>
            </div>
            <button type="button" id="modalDownload" class="mt-4 w-full py-3 bg-[#c71585] text-white rounded-xl font-semibold hover:bg-[#a0126a] transition flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                <span>Tải ảnh xuống</span>
            </button>
        </div>
    </div>

    <!-- Hidden Canvas for Image Processing -->
    <canvas id="processCanvas" class="hidden"></canvas>

    <script src="app.js"></script>
</body>
</html>
